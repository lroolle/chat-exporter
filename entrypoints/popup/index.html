<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Exporter Settings</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        width: 280px;
        padding: 16px;
        background: #fff;
        color: #202124;
      }
      h1 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      h1 svg {
        width: 20px;
        height: 20px;
      }
      .setting {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid #e8eaed;
      }
      .setting:last-child {
        border-bottom: none;
      }
      .setting-info {
        flex: 1;
      }
      .setting-label {
        font-weight: 500;
        margin-bottom: 2px;
      }
      .setting-desc {
        font-size: 12px;
        color: #5f6368;
      }
      input[type='checkbox'] {
        width: 18px;
        height: 18px;
        margin-top: 2px;
        accent-color: #1a73e8;
        cursor: pointer;
      }
      .footer {
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid #e8eaed;
        font-size: 12px;
        color: #5f6368;
        text-align: center;
      }
      .footer a {
        color: #1a73e8;
        text-decoration: none;
      }
      .footer a:hover {
        text-decoration: underline;
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
        color: #188038;
        text-align: center;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .status.visible {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <h1>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path
          d="M12 15V3m0 12l-4-4m4 4l4-4M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"
        />
      </svg>
      Export Settings
    </h1>

    <div class="settings">
      <div class="setting">
        <input type="checkbox" id="includeThinking" checked />
        <div class="setting-info">
          <div class="setting-label">Include thinking</div>
          <div class="setting-desc">
            Export Gemini's reasoning/thoughts in &lt;thinking&gt; tags
          </div>
        </div>
      </div>

      <div class="setting">
        <input type="checkbox" id="includeMetadata" checked />
        <div class="setting-info">
          <div class="setting-label">Include metadata</div>
          <div class="setting-desc">Add YAML frontmatter with conversation info</div>
        </div>
      </div>

      <div class="setting">
        <input type="checkbox" id="includeTimestamps" checked />
        <div class="setting-info">
          <div class="setting-label">Include timestamps</div>
          <div class="setting-desc">Add created/exported timestamps to metadata</div>
        </div>
      </div>
    </div>

    <div class="status" id="status">Settings saved</div>

    <div class="footer">
      Supports <a href="https://chatgpt.com" target="_blank">ChatGPT</a> &amp;
      <a href="https://gemini.google.com" target="_blank">Gemini</a>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
